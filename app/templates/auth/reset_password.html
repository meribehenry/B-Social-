{% extends "base.html" %}
{% block content %}
    {% import "macros/form.html" as render_form %}
    
    <section>
        <h2>Reset Password</h2>

        <form action="", method="POST">
            {{ form.hidden_tag() }}

            {{ render_form.render_field(form.password)}}
            {{ render_form.render_field(form.confirm_password)}}

            </div>
                {{ form.submit()}}
            </div>
        </form>
    </section>

{% endblock %}
