{% extends "base.html" %}
{% block content %}
    {% import "macros/form.html" as render_form %}
    
    <h2>New comment</h2>
    
    <section>
        <form action="" enctype="multipart/form-data" method="POST">
            {{ form.hidden_tag() }}

            {{ render_form.render_field(form.content) }}

            <div>
                {{ form.submit() }}
            </div>
        </form>
    </section>

{% endblock %}
