{% extends "base.html" %}
{% block content %}
    {% import "macros/form.html" as render_form %}

    <h2>New Post</h2>
    
    <section>
        <form action="" enctype="multipart/form-data" method="POST">
            {{ form.hidden_tag() }}

            {{ render_form.render_field(form.content)}}

            <!--  POST PHOTO IF ANY (FOR UPDATE POST ONLY) -->
            <div>
                {% if photo_url%}
                    <img src="{{ photo_url }}" alt="Photo" width="300"><br><br>
                {% endif %}
            </div>

            {{ render_form.render_field(form.photo)}}

            <div>
                {{ form.submit() }}
            </div>
        </form>
    </section>

{% endblock %}
