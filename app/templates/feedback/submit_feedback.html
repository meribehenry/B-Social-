{% extends "base.html" %}
{% block content %}
    {% import "macros/form.html" as render_post_field %}

<link rel="stylesheet" href="{{url_for('static', filename='css/post/style.css')}}">
    
    <section class="new-post-container">
        <form class="new-post-page" action="" enctype="multipart/form-data" method="POST">

            <h4 class="new-post-page-heading">Submit Feedback</h4>
               
            {{ form.hidden_tag() }}

            {{ render_post_field.render_post_field(form.text) }}

            <div>
                {{ form.submit(class="submit-button btn btn-primary") }}
            </div>
        </form>
    </section>

{% endblock %}
